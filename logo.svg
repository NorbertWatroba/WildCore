<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Tło w kolorze ciemnego moro -->
  <rect width="512" height="512" rx="110" fill="#2B3629"/>
  
  <!-- Taktyczna podziałka / Pierścień kompasu w tle -->
  <circle cx="256" cy="240" r="170" fill="none" stroke="#C2B280" stroke-width="3" stroke-dasharray="12 10" opacity="0.4"/>
  <circle cx="256" cy="240" r="150" fill="none" stroke="#C2B280" stroke-width="1.5" opacity="0.2"/>

  <!-- Główny sygnet: Połączenie Góry, Igły Kompasu i litery W -->
  <!-- Lewa flanka góry (Ciemniejsza oliwka) -->
  <polygon points="256,100 150,310 256,270" fill="#485B45"/>
  
  <!-- Prawa flanka góry (Jasna oliwka) -->
  <polygon points="256,100 256,270 362,310" fill="#5A7256"/>
  
  <!-- Rdzeń kompasu / Akcent igły magnetycznej (Khaki) -->
  <polygon points="256,100 256,230 275,215" fill="#D4AF37"/>
  <polygon points="256,100 237,215 256,230" fill="#C2B280"/>

  <!-- Dolne linie domykające kształt litery W -->
  <polyline points="150,310 195,350 256,270 317,350 362,310" fill="none" stroke="#C2B280" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Logotyp: WILDCORE -->
  <text x="256" y="445" font-family="'Roboto', 'Segoe UI', system-ui, sans-serif" font-size="34" font-weight="900" fill="#C2B280" text-anchor="middle" letter-spacing="10">WILDCORE</text>
</svg>
